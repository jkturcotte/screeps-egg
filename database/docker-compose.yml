version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: screeps-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - screeps_mongodb_data:/data/db

  redis:
    image: redis:7
    container_name: screeps-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - screeps_redis_data:/data

volumes:
  screeps_mongodb_data:
  screeps_redis_data: